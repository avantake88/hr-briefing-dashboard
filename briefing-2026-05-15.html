<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HR 뉴스 브리핑 2026-05-15</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Apple SD Gothic Neo','맑은 고딕',sans-serif;background:#edf1f7;color:#0f172a}

/* ── 페이지 헤더 ── */
.header{background:linear-gradient(135deg,#0f1117 0%,#1a1f2e 100%);border-bottom:1px solid #1e2538;padding:0}
.header-inner{max-width:2000px;margin:0 auto;padding:26px 44px;display:flex;align-items:center;gap:32px}
.header-left{flex:1}
.header-eyebrow{font-size:10px;font-weight:700;letter-spacing:2.5px;color:#4f6ef7;text-transform:uppercase;margin-bottom:8px}
.header-title{font-size:24px;font-weight:900;color:#f0f4ff;margin-bottom:6px;letter-spacing:-.5px}
.header-meta{font-size:12px;color:#94a3b8;font-weight:500}
.header-stats{display:flex;gap:12px}
.stat-chip{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:12px;padding:12px 22px;text-align:center;backdrop-filter:blur(10px)}
.stat-chip .num{font-size:24px;font-weight:900;color:#f1f5f9;line-height:1;letter-spacing:-1px}
.stat-chip .lbl{font-size:10px;color:#94a3b8;margin-top:4px;font-weight:600;letter-spacing:1px;text-transform:uppercase}

/* ── 레이아웃 ── */
.container{max-width:2000px;margin:0 auto;padding:28px 44px}
.section-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;align-items:stretch}

/* ── 섹션 카드 ── */
.section{border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.07),0 8px 24px rgba(0,0,0,.09);display:flex;flex-direction:column;background:#fff;border:1px solid #e2e8f0;overflow:hidden}
.section-cat-header{padding:18px 22px 16px;position:relative;overflow:hidden;border-radius:0}
.section-cat-header::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.06)}
.sec-header-row{display:flex;align-items:center;gap:10px;position:relative;z-index:1}
.sec-icon{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sec-title{font-size:14px;font-weight:800;color:#fff;letter-spacing:-.2px}
.sec-cnt{margin-left:auto;background:rgba(255,255,255,.2);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;backdrop-filter:blur(4px)}

/* ── 대표 기사 영역 ── (고정 높이로 좌우 섹션 통일) */
.featured-wrap{padding:14px 18px;border-left:4px solid transparent;height:420px;display:flex;flex-direction:column}
.featured-inner{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.06);flex:1;overflow:hidden;display:flex;flex-direction:column}
/* 하위기사 래퍼가 남은 공간을 채움 */
.grid-wrap{flex:1;display:flex;flex-direction:column;min-height:0}
.featured-badge{display:inline-flex;align-items:center;align-self:flex-start;gap:5px;font-size:10px;font-weight:700;padding:4px 11px;border-radius:20px;margin-bottom:12px;letter-spacing:.3px}
.featured-title{font-size:16px;font-weight:800;color:#0f172a;text-decoration:none;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:9px;letter-spacing:-.3px;min-height:2.8em}
.featured-title:hover{color:#4f6ef7}
.src-row{display:flex;align-items:center;gap:7px;margin-bottom:11px}
.src-badge{font-size:10px;font-weight:600;background:#f1f5f9;color:#64748b;border-radius:5px;padding:2px 8px;border:1px solid #e2e8f0}
.dt{font-size:10px;color:#94a3b8;font-weight:500}
.summary{font-size:13px;color:#374151;line-height:1.75;margin-bottom:13px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.discussion{border-radius:10px;padding:12px 15px;border:1px solid;margin-top:9px}
.disc-lbl{font-size:10px;font-weight:800;margin-bottom:8px;letter-spacing:.8px;text-transform:uppercase}
.disc-q{font-size:12px;line-height:1.65;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.06)}
.disc-q:last-child{border-bottom:none;padding-bottom:0}

/* ── 하위 기사 그리드 ── */
.grid{display:grid;grid-template-columns:repeat(2,1fr);grid-auto-rows:230px;align-content:start;gap:0;margin-top:1px}
.card{background:#fff;padding:14px 20px;border-top:1px solid #e2e8f0;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;overflow:hidden;height:230px}
.card:nth-child(even){border-right:none}
.card-empty{height:230px;border-top:1px solid #e2e8f0;border-right:1px solid #e2e8f0}
.card-empty:nth-child(even){border-right:none}
.card-title{font-size:12.5px;font-weight:700;color:#1e293b;text-decoration:none;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px;letter-spacing:-.1px;min-height:2.7em}
.card-title:hover{color:#4f6ef7}
.src-row-sm{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.card-summary{font-size:11.5px;color:#64748b;line-height:1.65;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-disc{border-radius:7px;padding:8px 11px;border:1px solid;margin-top:auto}
.card-disc-lbl{font-size:9px;font-weight:800;margin-bottom:5px;letter-spacing:.8px;text-transform:uppercase}
.card-disc-q{font-size:11px;line-height:1.55;margin-bottom:3px;font-weight:500}
.card-disc-q:last-child{margin-bottom:0}

/* ── 푸터 ── */
.footer{background:#edf1f7;border-top:1px solid #dde3ec;padding:0}
.footer-inner{max-width:2000px;margin:0 auto;padding:20px 44px;font-size:11px;color:#94a3b8;display:flex;justify-content:space-between;align-items:center;font-weight:500;letter-spacing:.3px}

@media(max-width:1100px){.section-grid{grid-template-columns:1fr}}
@media(max-width:768px){.header-inner,.container,.footer-inner{padding:20px 16px}.header-stats{display:none}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="header-left">
      <div class="header-eyebrow">Daily HR Briefing</div>
      <div class="header-title">📋 HR 뉴스 브리핑</div>
      <div class="header-meta">2026-05-15 &nbsp;·&nbsp; 오전 9:00 자동 발행</div>
    </div>
    <div class="header-stats">
      <div class="stat-chip">
        <div class="num">0</div>
        <div class="lbl">Articles</div>
      </div>
      <div class="stat-chip">
        <div class="num">0</div>
        <div class="lbl">Topics</div>
      </div>
    </div>
  </div>
</div>
<div class="container">
<div class="section-grid">

</div>
</div>
<div class="footer">
  <div class="footer-inner">
    <span>HR 뉴스 브리핑 &nbsp;·&nbsp; AUTO-GENERATED</span>
    <span>2026-05-15</span>
  </div>
</div>
</body></html>
